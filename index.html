<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0b1026" />
    <title>Portal Walk</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0b1026;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        /* タッチ操作(移動スティックのドラッグ)でテキスト選択やコールアウトが
           起動しないよう全体で抑止する(子要素へ継承される) */
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
        -webkit-tap-highlight-color: transparent;
      }
      #app {
        position: fixed;
        inset: 0;
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
      }
      #app canvas {
        display: block;
        width: 100%;
        height: 100%;
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
      }
      #hud {
        position: fixed;
        top: env(safe-area-inset-top, 0);
        left: 0;
        right: 0;
        padding: 14px 18px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        color: #fff;
        text-shadow: 0 1px 4px rgba(0, 0, 0, 0.5);
        pointer-events: none;
        user-select: none;
        -webkit-user-select: none;
      }
      #hud .title {
        font-weight: 700;
        letter-spacing: 0.04em;
        opacity: 0.9;
      }
      #world-name {
        font-weight: 600;
        padding: 4px 12px;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(6px);
        transition: background 0.6s;
      }
      #hint {
        position: fixed;
        bottom: calc(env(safe-area-inset-bottom, 0px) + 28px);
        left: 50%;
        transform: translateX(-50%);
        color: #fff;
        background: rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(6px);
        padding: 10px 18px;
        border-radius: 999px;
        font-size: 14px;
        pointer-events: none;
        user-select: none;
        -webkit-user-select: none;
        white-space: nowrap;
        opacity: 1;
        transition: opacity 1.2s ease;
      }
      #hint.hidden {
        opacity: 0;
      }
      .stick-base,
      .stick-knob {
        position: fixed;
        transform: translate(-50%, -50%);
        border-radius: 50%;
        pointer-events: none;
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
        z-index: 10;
      }
      .stick-base {
        width: 140px;
        height: 140px;
        border: 2px solid rgba(255, 255, 255, 0.45);
        background: rgba(255, 255, 255, 0.08);
      }
      .stick-knob {
        width: 56px;
        height: 56px;
        background: rgba(255, 255, 255, 0.55);
        box-shadow: 0 0 12px rgba(255, 255, 255, 0.35);
      }
      #view-btn,
      #save-btn {
        position: fixed;
        top: calc(env(safe-area-inset-top, 0px) + 56px);
        right: 14px;
        pointer-events: auto;
        user-select: none;
        -webkit-user-select: none;
        -webkit-tap-highlight-color: transparent;
        color: #fff;
        background: rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(6px);
        border: 1px solid rgba(255, 255, 255, 0.45);
        border-radius: 999px;
        padding: 8px 14px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        z-index: 30;
      }
      #save-btn {
        left: 14px;
        right: auto;
      }
      #save-panel {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.45);
        pointer-events: auto;
        z-index: 40;
      }
      #save-panel.visible {
        display: flex;
      }
      #save-panel .card {
        width: min(92vw, 480px);
        box-sizing: border-box;
        padding: 18px;
        border-radius: 16px;
        background: rgba(16, 22, 44, 0.96);
        border: 1px solid rgba(255, 255, 255, 0.4);
        color: #fff;
        font-size: 14px;
      }
      #save-panel .title {
        font-weight: 700;
        margin-bottom: 8px;
      }
      #save-panel .hint {
        font-size: 12px;
        opacity: 0.75;
        margin-bottom: 8px;
      }
      #save-code {
        width: 100%;
        box-sizing: border-box;
        height: 96px;
        resize: none;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.4);
        background: rgba(0, 0, 0, 0.35);
        color: #fff;
        font-family: ui-monospace, monospace;
        font-size: 12px;
        padding: 8px;
      }
      #save-panel .row {
        display: flex;
        gap: 8px;
        margin-top: 10px;
      }
      #save-panel .row button {
        flex: 1;
        padding: 10px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.45);
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
        font-weight: 600;
        cursor: pointer;
      }
      #save-image-preview {
        display: none;
        margin: 10px auto 0;
        max-width: 100%;
        image-rendering: pixelated;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.4);
        /* 長押しで「写真に保存」を出せるよう、画像だけはコールアウトを許可 */
        -webkit-touch-callout: default;
        -webkit-user-select: auto;
        user-select: auto;
        pointer-events: auto;
      }
      #save-image-preview.visible {
        display: block;
      }
      #save-status {
        margin-top: 8px;
        font-size: 12px;
        min-height: 1.2em;
        opacity: 0.9;
      }
      /* オーバーレイ内は連打してもダブルタップ拡大/選択/ハイライトを起こさない */
      #choice-overlay,
      #battle-overlay,
      #choice-overlay *,
      #battle-overlay * {
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
        -webkit-tap-highlight-color: transparent;
      }
      /* --- 選択肢オーバーレイ --- */
      #choice-overlay {
        position: fixed;
        inset: 0;
        display: none;
        align-items: flex-end;
        justify-content: center;
        background: rgba(0, 0, 0, 0.25);
        pointer-events: auto;
        z-index: 45;
      }
      #choice-overlay.visible {
        display: flex;
      }
      #choice-overlay .choice-card {
        width: min(92vw, 480px);
        box-sizing: border-box;
        margin-bottom: calc(env(safe-area-inset-bottom, 0px) + 20px);
        padding: 16px 18px;
        border-radius: 16px;
        border: 2px solid rgba(255, 255, 255, 0.6);
        background: rgba(10, 14, 40, 0.92);
        backdrop-filter: blur(6px);
        color: #fff;
      }
      #choice-overlay .choice-question {
        font-size: 16px;
        font-weight: 700;
        margin-bottom: 12px;
        text-align: center;
      }
      #choice-overlay .choice-options {
        display: flex;
        gap: 10px;
      }
      #choice-overlay .choice-options button {
        flex: 1;
        padding: 12px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.5);
        background: rgba(255, 255, 255, 0.12);
        color: #fff;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
      }
      /* --- 戦闘オーバーレイ --- */
      #battle-overlay {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at 50% 30%, #1a2350, #070a1c);
        pointer-events: auto;
        z-index: 50;
        color: #fff;
      }
      #battle-overlay.visible {
        display: flex;
      }
      #battle-overlay .bt-card {
        width: min(94vw, 520px);
        box-sizing: border-box;
        padding: 22px 20px;
        text-align: center;
      }
      #battle-overlay .bt-phase {
        font-size: 18px;
        font-weight: 800;
        letter-spacing: 0.06em;
        opacity: 0.95;
        margin-bottom: 14px;
      }
      #battle-overlay .bt-avatar {
        margin: 0 auto;
        border-radius: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 36px;
        font-weight: 800;
        color: rgba(255, 255, 255, 0.92);
        box-shadow: 0 6px 22px rgba(0, 0, 0, 0.45);
      }
      #battle-overlay .bt-name {
        margin-top: 8px;
        font-weight: 700;
      }
      #battle-overlay .bt-comment {
        margin: 12px auto;
        max-width: 420px;
        font-size: 15px;
        line-height: 1.6;
        opacity: 0.92;
      }
      #battle-overlay .bt-terrain {
        margin: 8px 0 18px;
        font-size: 13px;
        opacity: 0.8;
      }
      #battle-overlay .bt-hint {
        font-size: 12px;
        opacity: 0.7;
        margin-bottom: 12px;
      }
      #battle-overlay .bt-primary {
        margin-top: 16px;
        padding: 12px 28px;
        border-radius: 999px;
        border: none;
        background: linear-gradient(180deg, #ffd35a, #f0a93a);
        color: #2a1c00;
        font-size: 16px;
        font-weight: 800;
        cursor: pointer;
      }
      #battle-overlay .bt-primary:disabled {
        background: rgba(255, 255, 255, 0.18);
        color: rgba(255, 255, 255, 0.5);
        cursor: default;
      }
      #battle-overlay .bt-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        margin: 6px 0 14px;
      }
      #battle-overlay .bt-char {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        padding: 10px 4px;
        border-radius: 12px;
        border: 2px solid rgba(255, 255, 255, 0.18);
        background: rgba(255, 255, 255, 0.06);
        color: #fff;
        font-size: 12px;
        cursor: pointer;
      }
      #battle-overlay .bt-char.main {
        border-color: #ffd35a;
        background: rgba(255, 211, 90, 0.16);
      }
      #battle-overlay .bt-char.support {
        border-color: #5ad1ff;
        background: rgba(90, 209, 255, 0.16);
      }
      #battle-overlay .bt-chip {
        width: 30px;
        height: 30px;
        border-radius: 8px;
      }
      #battle-overlay .bt-role {
        position: absolute;
        top: 2px;
        right: 4px;
        font-size: 9px;
        opacity: 0.85;
      }
      #battle-overlay .bt-picks {
        font-size: 13px;
        opacity: 0.9;
        margin-bottom: 4px;
      }
      #battle-overlay .bt-fight {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 16px;
        margin-bottom: 18px;
      }
      #battle-overlay .bt-vs {
        font-size: 20px;
        font-weight: 800;
        opacity: 0.8;
      }
      #battle-overlay .bt-hp-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 6px auto;
        max-width: 420px;
      }
      #battle-overlay .bt-hp-label {
        width: 56px;
        text-align: left;
        font-size: 12px;
        opacity: 0.85;
      }
      #battle-overlay .bt-hp-track {
        flex: 1;
        height: 12px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.14);
        overflow: hidden;
      }
      #battle-overlay .bt-hp-fill {
        display: block;
        height: 100%;
        border-radius: 999px;
        transition: width 0.2s;
      }
      #battle-overlay .bt-hp-num {
        width: 34px;
        text-align: right;
        font-size: 12px;
        font-variant-numeric: tabular-nums;
      }
      #battle-overlay .bt-result {
        padding: 20px 0;
        border-radius: 16px;
      }
      #battle-overlay .bt-result.win {
        background: radial-gradient(circle, rgba(255, 220, 120, 0.25), transparent 70%);
      }
      #battle-overlay .bt-result.lose {
        background: radial-gradient(circle, rgba(80, 100, 160, 0.25), transparent 70%);
        filter: saturate(0.7);
      }
      #battle-overlay .bt-result-emoji {
        font-size: 56px;
      }
      #battle-overlay .bt-result-title {
        font-size: 24px;
        font-weight: 800;
        margin-top: 6px;
      }
      #battle-overlay .bt-result.win .bt-result-title {
        color: #ffd35a;
      }
      #battle-overlay .bt-result.lose .bt-result-title {
        color: #9fb0d8;
      }
      #battle-overlay .bt-result-sub {
        font-size: 14px;
        opacity: 0.85;
        margin-top: 6px;
      }
      #glide,
      #climb {
        position: fixed;
        top: calc(env(safe-area-inset-top, 0px) + 56px);
        left: 50%;
        transform: translateX(-50%);
        color: #fff;
        background: rgba(40, 90, 160, 0.55);
        backdrop-filter: blur(6px);
        padding: 6px 16px;
        border-radius: 999px;
        font-size: 14px;
        font-weight: 600;
        pointer-events: none;
        user-select: none;
        -webkit-user-select: none;
        white-space: nowrap;
        opacity: 0;
        transition: opacity 0.2s;
        z-index: 20;
      }
      #climb {
        background: rgba(120, 90, 50, 0.6);
      }
      #glide.visible,
      #climb.visible {
        opacity: 1;
      }
      #bubble {
        position: fixed;
        transform: translate(-50%, -100%);
        max-width: 70vw;
        padding: 8px 14px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.92);
        color: #222;
        font-size: 14px;
        white-space: nowrap;
        pointer-events: none;
        user-select: none;
        -webkit-user-select: none;
        opacity: 0;
        transition: opacity 0.15s;
        z-index: 20;
      }
      #bubble::after {
        content: '';
        position: absolute;
        left: 50%;
        bottom: -8px;
        transform: translateX(-50%);
        border: 8px solid transparent;
        border-top-color: rgba(255, 255, 255, 0.92);
        border-bottom: none;
      }
      #bubble.visible {
        opacity: 1;
      }
      #dialog {
        position: fixed;
        left: 50%;
        bottom: calc(env(safe-area-inset-bottom, 0px) + 16px);
        transform: translateX(-50%);
        width: min(92vw, 560px);
        box-sizing: border-box;
        padding: 16px 18px 12px;
        border-radius: 14px;
        border: 2px solid rgba(255, 255, 255, 0.6);
        background: rgba(10, 14, 40, 0.82);
        backdrop-filter: blur(6px);
        color: #fff;
        font-size: 15px;
        line-height: 1.6;
        pointer-events: none;
        user-select: none;
        -webkit-user-select: none;
        display: none;
        z-index: 30;
      }
      #dialog.visible {
        display: block;
      }
      /* イベント中はタップ送りではないので「タップで進む」表示を隠す */
      #dialog.event .next {
        display: none;
      }
      #dialog .next {
        margin-top: 6px;
        text-align: right;
        font-size: 12px;
        opacity: 0.7;
        animation: blink 1.2s infinite;
      }
      @keyframes blink {
        50% {
          opacity: 0.2;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud">
      <span class="title">◆ Portal Walk</span>
      <span id="world-name">昼の世界</span>
    </div>
    <div id="hint">下半分で移動 / 上半分で見回し / はじくとダッシュ</div>
    <div id="glide">🪂 滑空中</div>
    <div id="climb">🧗 よじ登り中</div>
    <button id="view-btn" type="button">🧍 3人称</button>
    <button id="save-btn" type="button">💾 セーブ</button>
    <div id="save-panel">
      <div class="card">
        <div class="title">セーブ / ロード</div>
        <div class="hint">「コピー」で現在のセーブコードをコピー。別のコードを貼り付けて「ロード」。</div>
        <textarea id="save-code" spellcheck="false" placeholder="ここにセーブコードを貼り付けて「ロード」"></textarea>
        <div class="row">
          <button id="save-copy" type="button">コピー</button>
          <button id="save-load" type="button">ロード</button>
        </div>
        <div class="hint" style="margin-top: 12px">
          画像でも保存できます。「画像で保存」で生成→長押し/保存で写真へ。「画像から読込」で写真を選んで復元。
        </div>
        <div class="row">
          <button id="save-image" type="button">画像で保存</button>
          <button id="save-image-load" type="button">画像から読込</button>
        </div>
        <img id="save-image-preview" alt="セーブ画像(長押しで写真に保存)" />
        <input id="save-image-file" type="file" accept="image/*" hidden />
        <div class="row">
          <button id="save-close" type="button">閉じる</button>
        </div>
        <div id="save-status"></div>
      </div>
    </div>
    <div id="choice-overlay"></div>
    <div id="battle-overlay"></div>
    <div id="bubble"></div>
    <div id="dialog">
      <div id="dialog-text"></div>
      <div class="next">タップで進む ▼</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
